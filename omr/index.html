<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koreksi Pilihan Ganda — Scan Kamera</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app">
    <div class="brand">
      <h1>Koreksi Pilihan Ganda</h1>
      <span class="tag">scan kamera · silang ballpoint · offline</span>
    </div>
    <nav class="tabs">
      <button data-tab="setup" class="active">Pengaturan</button>
      <button data-tab="key">Kunci Jawaban</button>
      <button data-tab="sheet">Lembar Jawaban</button>
      <button data-tab="scan">Scan &amp; Koreksi</button>
      <button data-tab="results">Rekap Nilai</button>
    </nav>
  </header>

  <main>
    <section id="view-setup" class="view active"></section>
    <section id="view-key" class="view"></section>
    <section id="view-sheet" class="view"></section>
    <section id="view-scan" class="view"></section>
    <section id="view-results" class="view"></section>
  </main>

  <!-- Library export (lokal, bukan CDN) -->
  <script src="lib/xlsx.full.min.js"></script>
  <script src="lib/jspdf.umd.min.js"></script>
  <script src="lib/jspdf.plugin.autotable.min.js"></script>
  <script src="lib/docx.iife.js"></script>

  <!-- Modul aplikasi (urutan penting) -->
  <script src="js/config.js"></script>
  <script src="js/scanner.js"></script>
  <script src="js/scoring.js"></script>
  <script src="js/sheet-generator.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
