<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koreksi Pilihan Ganda — Scan Kamera</title>
  <!-- Versi otomatis: file aplikasi (CSS + JS milik kita) selalu dimuat versi
       terbaru, jadi tak perlu bersihkan cache tiap update. Library di lib/
       tetap di-cache karena tak pernah berubah. -->
  <script>window.__V = Date.now();</script>
  <script>document.write('<link rel="stylesheet" href="css/style.css?v=' + window.__V + '">');</script>
  <style>
    /* Layar pembuka (splash) — kritikal & inline agar tampil instan */
    #splash { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px; text-align: center; padding: 24px;
      color: #fff; font-family: "Segoe UI Variable", "Segoe UI", system-ui, -apple-system, Roboto, sans-serif;
      background-color: #1f4e79;
      /* overlay biru gelap DI ATAS foto sekolah -> logo & teks tetap terbaca.
         Jika assets/sekolah-bg.jpg hilang, otomatis jadi biru polos. */
      background-image: linear-gradient(135deg, rgba(31,78,121,.85) 0%, rgba(23,61,97,.92) 100%), url('assets/sekolah-bg.jpg');
      background-size: cover; background-position: center;
      transition: opacity .45s ease, visibility .45s ease; }
    #splash.hide { opacity: 0; visibility: hidden; }
    #splash .sp-logo { height: 132px; width: auto; max-width: 70%;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,.4)); }
    #splash .sp-school { font-size: 18px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
      text-shadow: 0 1px 6px rgba(0,0,0,.35); max-width: 22ch; line-height: 1.3; }
    #splash .sp-ring { width: 44px; height: 44px; border-radius: 50%; margin-top: 6px;
      border: 4px solid rgba(255,255,255,.25); border-top-color: #f0623e; animation: sp-spin .8s linear infinite; }
    #splash .sp-sub { font-size: 12px; color: #b9d0e4; letter-spacing: .3px; }
    @keyframes sp-spin { to { transform: rotate(360deg); } }
  </style>
  <script>
    /* tandai waktu mulai + pengaman: splash wajib hilang walau app gagal dimuat */
    window.__splashStart = Date.now();
    setTimeout(function () { var s = document.getElementById('splash'); if (s) s.classList.add('hide'); }, 6000);
  </script>
</head>
<body>
  <div id="splash">
    <img class="sp-logo" src="assets/logo-sekolah.png" alt="" onerror="this.style.display='none'">
    <div class="sp-school">SMKN 1 MANGGAR</div>
    <div class="sp-ring"></div>
    <div class="sp-sub">memuat…</div>
  </div>
  <header class="app">
    <div class="brand">
      <h1>Koreksi Pilihan Ganda</h1>
      <span class="tag">scan kamera · silang ballpoint · offline</span>
      <button id="menu-toggle" class="menu-toggle" aria-label="Buka menu">
        <svg class="ic-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        <svg class="ic-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
        <span class="mt-label">Menu</span>
      </button>
    </div>
    <nav class="tabs">
      <button data-tab="setup" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Pengaturan</button>
      <button data-tab="key"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3"/></svg>Kunci Jawaban</button>
      <button data-tab="sheet"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/><line x1="8" y1="9" x2="10" y2="9"/></svg>Lembar Jawaban</button>
      <button data-tab="scan"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>Scan &amp; Koreksi</button>
      <button data-tab="results"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Rekap Nilai</button>
    </nav>
    <div id="profile-bar" class="profile-bar"></div>
  </header>

  <main>
    <section id="view-setup" class="view active"></section>
    <section id="view-key" class="view"></section>
    <section id="view-sheet" class="view"></section>
    <section id="view-scan" class="view"></section>
    <section id="view-results" class="view"></section>
  </main>

  <!-- Library export (lokal, bukan CDN) -->
  <script src="lib/xlsx.full.min.js"></script>
  <script src="lib/jspdf.umd.min.js"></script>
  <script src="lib/jspdf.plugin.autotable.min.js"></script>
  <script src="lib/docx.iife.js"></script>

  <!-- Modul aplikasi (urutan penting) — dimuat dgn penanda versi otomatis -->
  <script>
    (function () {
      var v = window.__V || Date.now();
      var files = ['js/config.js', 'js/scanner.js', 'js/scoring.js', 'js/sheet-generator.js', 'js/export.js', 'js/app.js'];
      for (var i = 0; i < files.length; i++) document.write('<script src="' + files[i] + '?v=' + v + '"><\/script>');
    })();
  </script>
</body>
</html>
